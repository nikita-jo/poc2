name: CI/CD — DevSecOps Pipeline (Build → Test → Scan → AI Review → Remediate → Re-Scan → Deploy)

# Required repository secrets (Settings → Secrets and variables → Actions):
#   SONAR_TOKEN         - SonarCloud account token (https://sonarcloud.io/account/security)
#   SONAR_ORGANIZATION  - SonarCloud organisation key
#   SONAR_PROJECT_KEY   - SonarCloud project key (must already exist in the org)
#   NVIDIA_API_KEY      - NVIDIA build / integrate API key (https://build.nvidia.com)
#
# Optional:
#   DEPLOY_SSH_KEY, KUBE_CONFIG, AWS_*  - whatever your real deploy step needs
#   MIN_COVERAGE (workflow var)         - default 70
#   ALLOW_CRITICAL (workflow var)       - default false
#   ALLOW_HIGH (workflow var)           - default false
#
# GitHub Environments to create (Settings → Environments):
#   dev        - typically no required reviewers
#   qa         - 1 required reviewer from the QA team
#   production - 2 required reviewers, wait timer, branch restriction = main only

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        default: dev
        options:
          - dev
          - qa
          - production
      skip_remediation:
        description: "Skip AI remediation stage (use with caution)"
        required: false
        type: boolean
        default: false

# Tightest possible default; jobs widen as needed.
permissions:
  contents: read

env:
  SONAR_HOST_URL: https://sonarcloud.io
  SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || secrets.SONAR_PROJECT_KEY }}
  SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION || secrets.SONAR_ORGANIZATION }}
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository -Dorg.slf4j.simpleLogger.showDateTime=false"
  MIN_COVERAGE: ${{ vars.MIN_COVERAGE || '80' }}
  # JaCoCo line-coverage ratio (0..1) — separate from MIN_COVERAGE (which is a
  # percentage used by check-deploy-gates.py). 80% = pipeline policy.
  MIN_COVERAGE_RATIO: ${{ vars.MIN_COVERAGE_RATIO || '0.80' }}
  ALLOW_CRITICAL: ${{ vars.ALLOW_CRITICAL || 'false' }}
  ALLOW_HIGH: ${{ vars.ALLOW_HIGH || 'false' }}
  REPORT_DIR: reports
  DEPLOY_ENV: ${{ github.event.inputs.environment || 'dev' }}

# ---------------------------------------------------------------
# 1. BUILD  (Maven, Java 21, cached)
# ---------------------------------------------------------------
jobs:
  build:
    name: "1. Build (Maven, Java 21)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: .m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml', '**/pom.xml.versionsBackup') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build (compile only)
        run: mvn -B -ntp -DskipTests -Dmaven.javadoc.skip=true package
        # Hard-fail on compile error (the default for `run:`).

      - name: Verify build artifacts exist
        run: ls -la target/ | tee target/.build-ok

      - name: Upload build outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            target/classes
            target/*.jar
            target/.build-ok
          if-no-files-found: warn
          retention-days: 7

  # ---------------------------------------------------------------
  # 2. UNIT TEST  +  3. TEST COVERAGE  (JaCoCo via -Pcoverage)
  # ---------------------------------------------------------------
  unit-test:
    name: "2. Unit Tests (JUnit 5)"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: .m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run unit tests (Surefire)
        run: mvn -B -ntp test
      - name: Verify tests ran
        run: |
          set -e
          if [ ! -d target/surefire-reports ]; then
            echo "::warning::No surefire-reports directory found — likely zero tests were discovered. Add tests under src/test/java to enable coverage."
            exit 0
          fi
          XML_COUNT=$(find target/surefire-reports -maxdepth 1 -name 'TEST-*.xml' | wc -l | tr -d ' ')
          if [ "${XML_COUNT}" -eq 0 ]; then
            echo "::warning::surefire-reports exists but contains no TEST-*.xml files. Tests may have been skipped or none matched the include patterns."
            exit 0
          fi
          echo "Surefire reports (${XML_COUNT} test classes):"
          ls -la target/surefire-reports/

      - name: Upload JUnit + Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-reports
          path: |
            target/surefire-reports/
          if-no-files-found: warn
          retention-days: 30

  coverage:
    name: "3. Test Coverage (JaCoCo)"
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: .m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run unit tests (instrumented)
        # Plain `test` so the JaCoCo `prepare-agent` (bound to the test phase
        # by the coverage profile) instruments the JVM and produces the
        # jacoco.exec file.
        run: mvn -B -ntp -Pcoverage test

      - name: Generate JaCoCo coverage report
        # The JaCoCo `report` goal is bound to the `verify` phase in pom.xml,
        # so `mvn -Pcoverage report` is NOT a valid invocation — `report` is
        # a plugin goal, not a lifecycle phase. Run `verify` (which executes
        # the bound report goal) with the threshold forced to 0 so the bound
        # `check` goal never fails the build. The real threshold is enforced
        # by `check-deploy-gates` (uses MIN_COVERAGE).
        run: mvn -B -ntp -Pcoverage verify -Djacoco.min.coverage=0

      - name: Generate coverage summary (CSV + JSON + Markdown)
        if: always()
        env:
          MIN_COVERAGE: ${{ env.MIN_COVERAGE }}
        run: |
          set -euo pipefail
          # Always emit all three formats so the artifact upload has files even
          # when coverage is below threshold or no jacoco.xml was produced
          # (e.g. no tests exist yet). The script writes a "no data" payload in
          # that case rather than failing.
          mkdir -p reports
          python3 scripts/generate-coverage-report.py \
            --xml target/site/jacoco/jacoco.xml \
            --output-dir reports \
            --min-coverage ${MIN_COVERAGE}
          # Also keep a copy next to the raw jacoco.xml for the upload step,
          # but only when the JaCoCo output dir actually exists (it may not
          # if `mvn -Pcoverage verify` short-circuited).
          if [ -d target/site/jacoco ]; then
            cp reports/coverage-summary.csv target/site/jacoco/coverage-summary.csv
          fi

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-build-output
          path: |
            target/site/jacoco/jacoco.xml
            target/site/jacoco/jacoco.csv
            target/site/jacoco/index.html
            target/site/jacoco/coverage-summary.csv
            reports/coverage-summary.json
            reports/coverage-summary.md
            target/surefire-reports/
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------
  # 4. SONARCLOUD SCAN
  # ---------------------------------------------------------------
  sonarcloud-scan:
    name: "4. SonarCloud Scan"
    runs-on: ubuntu-latest
    needs: [coverage]
    permissions:
      contents: read
      pull-requests: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: .m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build (no tests; coverage job already did this)
        run: mvn -B -ntp -DskipTests package

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-build-output
          path: target/

        continue-on-error: true
      - name: SonarCloud scan
        if: env.SONAR_TOKEN != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORGANIZATION != ''
        id: sonar
        continue-on-error: false
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        uses: sonarsource/sonarqube-scan-action@v3
        with:
          projectBaseDir: .
          # Static config (sources, tests, coverage path, exclusions, Java
          # version) lives in sonar-project.properties at the repo root.
          # The workflow only passes the three secret-derived values so the
          # secret is never echoed into a properties file checked into git.
          args: >
            -Dsonar.projectKey=${SONAR_PROJECT_KEY}
            -Dsonar.organization=${SONAR_ORGANIZATION}
            -Dsonar.host.url=${SONAR_HOST_URL}

      - name: SonarCloud scan (skipped — missing secrets)
        if: env.SONAR_TOKEN == '' || env.SONAR_PROJECT_KEY == '' || env.SONAR_ORGANIZATION == ''
        run: |
          mkdir -p "$REPORT_DIR"
          echo "SKIPPED" > "$REPORT_DIR/sonar-quality-gate.txt"
          echo "::warning::SonarCloud scan skipped: SONAR_TOKEN, SONAR_PROJECT_KEY or SONAR_ORGANIZATION not set."

      # Generate the report BEFORE the QG wait so the artifacts still upload
      # on QG failure (the upload step is `if: always()`).
      - name: Generate Sonar report (JSON + Markdown)
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$REPORT_DIR"
          python3 scripts/generate-sonar-report.py \
            --output-dir "$REPORT_DIR" \
            --host "${SONAR_HOST_URL}" \
            --project-key "${SONAR_PROJECT_KEY}" \
            --token "${SONAR_TOKEN}" \
            --branch "${GITHUB_REF_NAME}" \
            --commit "${GITHUB_SHA}" \
            --page-size 500

      # Wait for the SonarCloud Quality Gate and fail the job when it
      # returns ERROR or FAILED. Reads projectKey/host from the scanner's
      # output (no extra config needed).
      - name: SonarCloud Quality Gate
        if: env.SONAR_TOKEN != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORGANIZATION != '' && steps.sonar.conclusion == 'success'
        uses: sonarsource/sonarqube-quality-gate-action@v1
        with:
          failOnQualityGateError: true
          inMillisecondsToWait: 300000
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload SonarCloud reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-report
          path: |
            reports/sonar-report.json
            reports/sonar-report.txt
            reports/SONAR_REPORT.md
            reports/sonar-quality-gate.txt
          if-no-files-found: error
          retention-days: 90

  # ---------------------------------------------------------------
  # 5. CODEQL STATIC ANALYSIS
  # ---------------------------------------------------------------
  codeql:
    name: "5. CodeQL Static Analysis"
    runs-on: ubuntu-latest
    needs: [coverage]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # CodeQL needs a compilable class graph. -DskipTests keeps the build
      # fast; tests are run in the `unit-test` job.
      - name: Build (compile only, for CodeQL)
        run: mvn -B -ntp -DskipTests -Dmaven.javadoc.skip=true package

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql

      - name: Copy CodeQL SARIF to reports/
        if: always()
        run: |
          mkdir -p reports
          # `codeql-action/analyze@v3` uploads to the Security tab by
          # category=codeql; mirror the file to a known path so the
          # deploy-gates job can download + parse it.
          FIRST=$(find . -path ./.git -prune -o -name "codeql*.sarif" -print 2>/dev/null | head -n 1 || echo "")
          if [ -n "$FIRST" ] && [ -f "$FIRST" ]; then
            cp "$FIRST" reports/codeql-results.sarif
          fi

      - name: Upload CodeQL results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-results
          path: reports/codeql-results.sarif
          if-no-files-found: error
          retention-days: 90

  # ---------------------------------------------------------------
  # 6. TRIVY SECURITY SCAN
  # ---------------------------------------------------------------
  trivy-scan:
    name: "6. Trivy Security Scan"
    runs-on: ubuntu-latest
    needs: [coverage]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build the container image locally (no push) so Trivy can scan it.
      # We use buildx with the docker-container driver for reproducibility
      # and a stable local tag.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        id: build_image
        env:
          IMAGE_TAG: vulnerable-spring-app:ci-${{ github.sha }}
        run: |
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          docker build -t "${IMAGE_TAG}" --load .

      - name: Run Trivy filesystem + image scan
        env:
          TRIVY_SEVERITY: "CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN"
          TRIVY_IMAGE: ${{ steps.build_image.outputs.IMAGE_TAG }}
        run: |
          bash scripts/generate-trivy-report.sh "$REPORT_DIR" .

      - name: Upload Trivy SARIF (FS) to Security tab
        if: always() && hashFiles('reports/trivy-fs.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/trivy-fs.sarif
          category: trivy-fs

      - name: Upload Trivy SARIF (image) to Security tab
        if: always() && hashFiles('reports/trivy-image.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/trivy-image.sarif
          category: trivy-image

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: |
            reports/trivy-report.json
            reports/trivy-report.txt
            reports/trivy-fs.sarif
            reports/trivy-fs.sarif.json
            reports/trivy-fs.raw.json
            reports/trivy-image.sarif
            reports/trivy-image.sarif.json
            reports/trivy-image.raw.json
            reports/trivy-report.raw.json
          if-no-files-found: error
          retention-days: 90

  # ---------------------------------------------------------------
  # 7. AI SECURITY REVIEW (NVIDIA)
  # ---------------------------------------------------------------
  security-ai-review:
    name: "7. AI Security Review (NVIDIA)"
    runs-on: ubuntu-latest
    needs: [sonarcloud-scan, trivy-scan, coverage, codeql]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download Sonar report
        uses: actions/download-artifact@v4
        with:
          name: sonar-report
          path: reports/
        continue-on-error: true
      - name: Download Trivy report
        uses: actions/download-artifact@v4
        with:
          name: trivy-report
          path: reports/
        continue-on-error: true
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-build-output
          path: target/

        continue-on-error: true
      - name: Stage jacoco + junit for the AI agent
        run: |
          set -euo pipefail
          mkdir -p reports
          if [ -f target/site/jacoco/jacoco.xml ]; then
            cp target/site/jacoco/jacoco.xml reports/jacoco.xml
          fi
          if [ -f target/site/jacoco/coverage-summary.csv ]; then
            cp target/site/jacoco/coverage-summary.csv reports/coverage-summary.csv
          fi
          if [ -f target/site/jacoco/coverage-summary.json ]; then
            cp target/site/jacoco/coverage-summary.json reports/coverage-summary.json
          fi
          if [ -f target/site/jacoco/coverage-summary.md ]; then
            cp target/site/jacoco/coverage-summary.md reports/coverage-summary.md
          fi
          if compgen -G "target/surefire-reports/*.xml" > /dev/null; then
            cp target/surefire-reports/*.xml reports/ || true
            # Provide a junit.xml alias for the AI agent
            FIRST_REPORT=$(ls target/surefire-reports/TEST-*.xml 2>/dev/null | head -n 1 || echo "")
            if [ -n "$FIRST_REPORT" ] && [ -f "$FIRST_REPORT" ]; then
              cp "$FIRST_REPORT" reports/junit.xml
            fi
          fi

      - name: Run AI Security Review agent
        if: always()
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          # Pass the coverage threshold into the agent so its prompt and
          # the deterministic fallback both honour the same gate.
          MIN_COVERAGE: ${{ env.MIN_COVERAGE }}
        run: |
          set -euo pipefail
          python3 scripts/ai-security-review.py --reports reports

      # Publish the agent's output under the brief's filename
      # (security-report.json) as well. ai-security-review.py writes
      # security-review.json internally; this step is a low-cost alias so
      # downstream consumers can use either name.
      - name: Alias security-report.json
        if: always()
        run: |
          set -euo pipefail
          if [ -f reports/security-review.json ]; then
            cp reports/security-review.json reports/security-report.json
          fi

      - name: Upload security review reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-review
          path: |
            reports/security-review.json
            reports/security-report.json
            reports/security-review.md
            reports/security-summary.txt
          if-no-files-found: error
          retention-days: 90

  # ---------------------------------------------------------------
  # 8. AI REMEDIATION (NVIDIA)
  # ---------------------------------------------------------------
  security-ai-remediate:
    name: "8. AI Remediation Agent (NVIDIA)"
    runs-on: ubuntu-latest
    needs: [security-ai-review]
    if: ${{ always() && needs.security-ai-review.result == 'success' && !inputs.skip_remediation }}
    permissions:
      contents: write
      pull-requests: write
    outputs:
      remediation_branch: ${{ steps.remediation.outputs.remediation_branch || '' }}
      remediation_pr_url: ${{ steps.remediation.outputs.remediation_pr_url || '' }}
      has_fixes: ${{ steps.remediation.outputs.has_fixes || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download security review
        uses: actions/download-artifact@v4
        with:
          name: security-review
          path: reports/

        continue-on-error: true
      - name: Download Sonar report
        uses: actions/download-artifact@v4
        with:
          name: sonar-report
          path: reports/

        continue-on-error: true
      - name: Download Trivy report
        uses: actions/download-artifact@v4
        with:
          name: trivy-report
          path: reports/

        continue-on-error: true
      - name: Install GitHub CLI
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            curl -fsSL https://cli.github.com/github-cli-archive-keyring.gpg \
              | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
              > /etc/apt/sources.list.d/github-cli.list
            apt-get update && apt-get install -y gh
          fi
          gh --version

      - name: Run AI Remediation agent
        id: remediation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          MIN_COVERAGE: ${{ env.MIN_COVERAGE }}
          REMEDIATION_BRANCH: ai-remediation/${{ github.sha }}
          REMEDIATION_TARGET: ${{ github.event.pull_request.base.ref || 'main' }}
          SKIP_PR: ${{ github.event_name == 'pull_request' && 'true' || '' }}
        run: |
          set -euo pipefail
          python3 scripts/ai-remediation.py --repo-root . --reports reports
          # Read back the remediation branch + PR URL for downstream jobs
          if [ -f reports/remediation-report.json ]; then
            BRANCH=$(python3 -c "import json; r=json.load(open('reports/remediation-report.json')); print(r.get('branch',''))")
            PR=$(python3 -c "import json; r=json.load(open('reports/remediation-report.json')); print(r.get('pr_url') or '')")
            HAS_FIXES=$(python3 -c "import json; r=json.load(open('reports/remediation-report.json')); print('true' if r.get('fixes') else 'false')")
          else
            BRANCH=""
            PR=""
            HAS_FIXES="false"
          fi
          echo "remediation_branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "remediation_pr_url=${PR}" >> "$GITHUB_OUTPUT"
          echo "has_fixes=${HAS_FIXES}" >> "$GITHUB_OUTPUT"

      - name: Stage remediation outputs
        if: always()
        run: |
          set -euo pipefail
          # Make sure all expected files exist (the remediation step may have
          # not produced any changes; that's fine).
          touch reports/remediation-summary.md
          touch reports/remediation-report.json
          touch reports/changed-files.txt
          touch reports/ai-patch.diff
          touch reports/git-diff-stat.txt
          touch reports/llm-prompt.txt
          touch reports/llm-response.txt

      - name: Validate build after remediation
        if: always()
        run: |
          set -euo pipefail
          if [ ! -f target/.rebuild-ok ] && [ ! -d target/classes ]; then
            echo "::warning::No build output found; the next job will rebuild."
          fi

      - name: Upload remediation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: remediation
          path: |
            reports/remediation-summary.md
            reports/remediation-report.json
            reports/changed-files.txt
            reports/ai-patch.diff
            reports/git-diff-stat.txt
            reports/llm-prompt.txt
            reports/llm-response.txt
          if-no-files-found: error
          retention-days: 90

  # ---------------------------------------------------------------
  # 9. REBUILD & RETEST
  # ---------------------------------------------------------------
  rebuild-and-retest:
    name: "9. Rebuild & Retest (post-remediation)"
    runs-on: ubuntu-latest
    needs: [security-ai-remediate]
    if: ${{ always() && (needs.security-ai-remediate.result == 'success' || needs.security-ai-remediate.result == 'skipped') }}
    outputs:
      ref: ${{ steps.set_ref.outputs.ref }}
    steps:
      - name: Decide which ref to check out
        id: set_ref
        run: |
          # Prefer the remediation branch (already pushed by the AI agent) when
          # the previous job produced one. Otherwise stay on the workflow ref.
          if [ -n "${{ needs.security-ai-remediate.outputs.remediation_branch }}" ]; then
            echo "ref=${{ needs.security-ai-remediate.outputs.remediation_branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.set_ref.outputs.ref }}
          fetch-depth: 50

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: .m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build (compile)
        run: mvn -B -ntp -DskipTests -Dmaven.javadoc.skip=true package
      - name: Run unit tests (instrumented)
        run: mvn -B -ntp -Pcoverage test
      - name: Generate JaCoCo coverage report
        # Same rationale as the `coverage` job: invoke the `verify` phase so
        # the bound `report` goal writes jacoco.xml, with the threshold forced
        # to 0 so the bound `check` goal never fails the build. The real
        # threshold is enforced by `check-deploy-gates`.
        run: mvn -B -ntp -Pcoverage verify -Djacoco.min.coverage=0
      - name: Mark rebuild success
        run: mkdir -p target && touch target/.rebuild-ok

      - name: Re-stage coverage summary
        if: always()
        env:
          MIN_COVERAGE: ${{ env.MIN_COVERAGE }}
        run: |
          set -euo pipefail
          mkdir -p reports
          python3 scripts/generate-coverage-report.py \
            --xml target/site/jacoco/jacoco.xml \
            --output-dir reports \
            --min-coverage ${MIN_COVERAGE}
          # The JaCoCo output dir may not exist if the rebuild's coverage step
          # short-circuited (e.g. failed tests, missing jacoco report). Only
          # mirror the CSV there when the dir is present.
          if [ -d target/site/jacoco ]; then
            cp reports/coverage-summary.csv target/site/jacoco/coverage-summary.csv
          fi

      - name: Upload rebuild artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rebuild-output
          path: |
            target/
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------
  # 9. SONARCLOUD RE-SCAN
  # ---------------------------------------------------------------
  sonarcloud-rescan:
    name: "10. SonarCloud Re-Scan"
    runs-on: ubuntu-latest
    needs: [rebuild-and-retest]
    permissions:
      contents: read
      pull-requests: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.rebuild-and-retest.outputs.ref || '' }}
          fetch-depth: 0

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: .m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build (post-fix)
        run: mvn -B -ntp -DskipTests package

      - name: Download rebuilt coverage
        uses: actions/download-artifact@v4
        with:
          name: rebuild-output
          path: target/

        continue-on-error: true
      - name: SonarCloud re-scan
        if: env.SONAR_TOKEN != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORGANIZATION != ''
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        uses: sonarsource/sonarqube-scan-action@v3
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=${SONAR_PROJECT_KEY}
            -Dsonar.organization=${SONAR_ORGANIZATION}
            -Dsonar.host.url=${SONAR_HOST_URL}
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java
            -Dsonar.java.binaries=target/classes
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
            -Dsonar.junit.reportPaths=target/surefire-reports

      - name: SonarCloud re-scan (skipped)
        if: env.SONAR_TOKEN == '' || env.SONAR_PROJECT_KEY == '' || env.SONAR_ORGANIZATION == ''
        run: |
          mkdir -p reports
          echo "::warning::SonarCloud re-scan skipped (missing secrets)."

      - name: Generate post-fix Sonar report
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p reports
          python3 scripts/generate-sonar-report.py \
            --output-dir reports \
            --host "${SONAR_HOST_URL}" \
            --project-key "${SONAR_PROJECT_KEY}" \
            --token "${SONAR_TOKEN}" \
            --page-size 500
          # Rename for clarity
          if [ -f reports/sonar-report.json ]; then
            cp reports/sonar-report.json reports/sonar-report-after-fix.json
          fi
          if [ -f reports/sonar-report.txt ]; then
            cp reports/sonar-report.txt reports/sonar-report-after-fix.txt
          fi

      - name: Download pre-fix Sonar report
        uses: actions/download-artifact@v4
        with:
          name: sonar-report
          path: reports/

        continue-on-error: true
      - name: Generate Sonar diff report
        if: always() && hashFiles('reports/sonar-report.json') != '' && hashFiles('reports/sonar-report-after-fix.json') != ''
        run: |
          set -euo pipefail
          python3 scripts/generate-sonar-diff.py \
            --before reports/sonar-report.json \
            --after  reports/sonar-report-after-fix.json \
            --output reports/sonar-diff-report.md

      - name: Upload post-fix Sonar artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-report-after-fix
          path: |
            reports/sonar-report-after-fix.json
            reports/sonar-report-after-fix.txt
            reports/sonar-diff-report.md
          if-no-files-found: error
          retention-days: 90

  # ---------------------------------------------------------------
  # 10. TRIVY RE-SCAN
  # ---------------------------------------------------------------
  trivy-rescan:
    name: "11. Trivy Re-Scan"
    runs-on: ubuntu-latest
    needs: [rebuild-and-retest]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.rebuild-and-retest.outputs.ref }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build container image (post-remediation)
        id: build_image
        env:
          IMAGE_TAG: vulnerable-spring-app:ci-${{ github.sha }}-after-fix
        run: |
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          docker build -t "${IMAGE_TAG}" --load .

      - name: Run Trivy re-scan (FS + image)
        env:
          TRIVY_SEVERITY: "CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN"
          TRIVY_IMAGE: ${{ steps.build_image.outputs.IMAGE_TAG }}
        run: |
          # Write to a separate dir so we don't overwrite the pre-fix report.
          bash scripts/generate-trivy-report.sh reports-after-fix .

      - name: Rename Trivy re-scan outputs
        if: always()
        run: |
          set -euo pipefail
          if [ -f reports-after-fix/trivy-report.json ]; then
            mv reports-after-fix/trivy-report.json reports/trivy-report-after-fix.json
          fi
          if [ -f reports-after-fix/trivy-report.txt ]; then
            mv reports-after-fix/trivy-report.txt reports/trivy-report-after-fix.txt
          fi
          if [ -f reports-after-fix/trivy-fs.sarif ]; then
            mv reports-after-fix/trivy-fs.sarif reports/trivy-fs-after-fix.sarif
          fi
          if [ -f reports-after-fix/trivy-image.sarif ]; then
            mv reports-after-fix/trivy-image.sarif reports/trivy-image-after-fix.sarif
          fi
          rm -rf reports-after-fix

      - name: Download pre-fix Trivy report
        uses: actions/download-artifact@v4
        with:
          name: trivy-report
          path: reports/

        continue-on-error: true
      - name: Generate Trivy diff report
        if: always() && hashFiles('reports/trivy-report.json') != '' && hashFiles('reports/trivy-report-after-fix.json') != ''
        run: |
          set -euo pipefail
          python3 scripts/generate-trivy-diff.py \
            --before reports/trivy-report.json \
            --after  reports/trivy-report-after-fix.json \
            --output reports/trivy-diff.md

      - name: Upload Trivy re-scan SARIF (FS) to Security tab
        if: always() && hashFiles('reports/trivy-fs-after-fix.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/trivy-fs-after-fix.sarif
          category: trivy-fs-after-fix

      - name: Upload Trivy re-scan SARIF (image) to Security tab
        if: always() && hashFiles('reports/trivy-image-after-fix.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/trivy-image-after-fix.sarif
          category: trivy-image-after-fix

      - name: Upload Trivy re-scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-after-fix
          path: |
            reports/trivy-report-after-fix.json
            reports/trivy-report-after-fix.txt
            reports/trivy-fs-after-fix.sarif
            reports/trivy-image-after-fix.sarif
            reports/trivy-diff.md
          if-no-files-found: error
          retention-days: 90

  # ---------------------------------------------------------------
  # GATEKEEPER — runs before deploy
  # ---------------------------------------------------------------
  check-deploy-gates:
    name: "Pre-Deploy Gates"
    runs-on: ubuntu-latest
    needs: [rebuild-and-retest, sonarcloud-rescan, trivy-rescan, security-ai-remediate, codeql]
    if: ${{ always() }}
    outputs:
      deploy_recommended: ${{ steps.gates.outputs.deploy_recommended }}
      ref: ${{ steps.set_ref.outputs.ref }}
    steps:
      - name: Decide which ref to track
        id: set_ref
        run: |
          if [ -n "${{ needs.security-ai-remediate.outputs.remediation_branch }}" ]; then
            echo "ref=${{ needs.security-ai-remediate.outputs.remediation_branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.set_ref.outputs.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download all post-fix artifacts
        uses: actions/download-artifact@v4
        with:
          name: rebuild-output
          path: target/
        continue-on-error: true
      - name: Download post-fix Sonar
        uses: actions/download-artifact@v4
        with:
          name: sonar-report-after-fix
          path: reports/
        continue-on-error: true
      - name: Download post-fix Trivy
        uses: actions/download-artifact@v4
        with:
          name: trivy-report-after-fix
          path: reports/
        continue-on-error: true
      - name: Download remediation report
        uses: actions/download-artifact@v4
        with:
          name: remediation
          path: reports/

        continue-on-error: true
      - name: Download CodeQL SARIF
        uses: actions/download-artifact@v4
        with:
          name: codeql-results
          path: reports/

        continue-on-error: true
      - name: Normalize coverage report path
        if: always()
        run: |
          set -euo pipefail
          if [ -f target/site/jacoco/jacoco.xml ]; then
            cp target/site/jacoco/jacoco.xml reports/jacoco.xml
          fi
          if [ -f target/site/jacoco/coverage-summary.csv ]; then
            cp target/site/jacoco/coverage-summary.csv reports/coverage-summary.csv
          fi
          if [ -f target/site/jacoco/coverage-summary.json ]; then
            cp target/site/jacoco/coverage-summary.json reports/coverage-summary.json
          fi
          if [ -f target/site/jacoco/coverage-summary.md ]; then
            cp target/site/jacoco/coverage-summary.md reports/coverage-summary.md
          fi

      - name: Check all deploy gates
        id: gates
        if: always()
        env:
          DEPLOY_ENV: ${{ env.DEPLOY_ENV }}
          MIN_COVERAGE: ${{ env.MIN_COVERAGE }}
          ALLOW_CRITICAL: ${{ env.ALLOW_CRITICAL }}
          ALLOW_HIGH: ${{ env.ALLOW_HIGH }}
        run: |
          set -euo pipefail
          python3 scripts/check-deploy-gates.py \
            --coverage-summary reports/coverage-summary.csv \
            --sonar-report        reports/sonar-report-after-fix.json \
            --trivy-report        reports/trivy-report-after-fix.json \
            --remediation-report  reports/remediation-report.json \
            --codeql-sarif        reports/codeql-results.sarif \
            --rebuild-result      target/.rebuild-ok \
            --output              reports/deploy-gates.json
        continue-on-error: true

      - name: Echo gate result
        if: always()
        run: |
          set -euo pipefail
          cat reports/deploy-gates.json
          DEPLOY=$(python3 -c "import json;print(json.load(open('reports/deploy-gates.json'))['deploy_recommended'])")
          echo "deploy_recommended=${DEPLOY}" >> "$GITHUB_OUTPUT"
          if [ "${DEPLOY}" != "True" ]; then
            echo "::warning::Deploy gates did not all pass; deploy job will be skipped."
          fi

      - name: Upload deploy gate result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-gates
          path: reports/deploy-gates.json
          if-no-files-found: error
          retention-days: 90

  # ---------------------------------------------------------------
  # 11. DEPLOY
  # ---------------------------------------------------------------
  deploy:
    name: "12. Deploy"
    runs-on: ubuntu-latest
    needs: [check-deploy-gates]
    if: ${{ needs.check-deploy-gates.outputs.deploy_recommended == 'True' }}
    environment:
      name: ${{ github.event.inputs.environment || vars.DEPLOY_ENV || 'dev' }}
      url: ${{ steps.deploy.outputs.deploy_url }}
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-deploy-gates.outputs.ref || '' }}
          fetch-depth: 0

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: rebuild-output
          path: target/
        continue-on-error: true
      - name: Download gate decision
        uses: actions/download-artifact@v4
        with:
          name: deploy-gates
          path: reports/

        continue-on-error: true
      - name: Build deployable JAR
        run: mvn -B -ntp -DskipTests -Dmaven.javadoc.skip=true package

      - name: "🚢 Deploy"
        id: deploy
        env:
          # Add the transport-specific secrets you need here, e.g.:
          # AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, KUBE_CONFIG, AZURE_CREDENTIALS, etc.
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          DEPLOY_ENV: ${{ github.event.inputs.environment || vars.DEPLOY_ENV || 'dev' }}
        run: |
          set -e
          ENV="${DEPLOY_ENV}"
          echo "::notice::Deploying to ${ENV}"
          echo "Target JAR: $(ls -1 target/*.jar 2>/dev/null | head -n 1 || echo 'no jar')"
          # ---------------------------------------------------------
          #  REPLACE THIS BLOCK WITH YOUR REAL DEPLOY STEPS.
          #  Examples:
          #    - Azure Web Apps:    azure/webapps-deploy@v3
          #    - AWS S3 + ECS:      aws-actions/configure-aws-credentials@v4 + ecspresso
          #    - Kubernetes:        azure/k8s-set-context@v3 + kubectl apply
          #    - SSH pull:          appleboy/scp-action
          # ---------------------------------------------------------
          mkdir -p deploy-artifacts
          cp target/*.jar deploy-artifacts/ 2>/dev/null || true
          echo "Deployed jar version: $(cat target/maven-archiver/pom.properties 2>/dev/null || echo unknown)" \
            > deploy-artifacts/deploy-info.txt
          echo "https://example.com/${ENV}/health" > deploy-artifacts/deploy-url.txt

      - name: Upload deploy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-artifacts
          path: deploy-artifacts/
          if-no-files-found: warn
          retention-days: 30
