# =====================================================================
# SonarCloud Cloud configuration for vulnerable-spring-app.
# Auto-discovered by both the Maven Sonar plugin (when running
# `mvn sonar:sonar`) and the `sonarsource/sonarqube-scan-action@v3`
# CLI wrapper. The CLI wrapper runs the scanner in a Docker container
# that does NOT propagate the host's env vars as `${env.X}` to the
# property resolver — only the `mvn` flow does that. So everything in
# this file is either a literal value (sonar.host.url, sources, etc.)
# or is overridden by `-D` system properties the CI workflow passes via
# the `args:` field of sonarqube-scan-action. The CI workflow supplies:
#   -Dsonar.projectKey=...  -Dsonar.organization=...  -Dsonar.host.url=...
# Do not commit credentials here — SONAR_TOKEN is passed via the action's
# `env:` block and never written to disk.
# =====================================================================

# --- Project identity (overridden by CI workflow via -D) --------------
# Left as comments so local `mvn sonar:sonar` runs that need them can
# uncomment, and so a curious reader sees what the CI sets.
# sonar.projectKey=
# sonar.organization=

# --- SonarCloud host (public, safe to commit) ------------------------
# The CLI action also receives `-Dsonar.host.url=...` from the workflow,
# but the scanner's startup version check uses this value BEFORE -D
# flags are applied — so the file must contain a real URL.
sonar.host.url=https://sonarcloud.io

# --- Source layout ------------------------------------------------------
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.sourceEncoding=UTF-8
sonar.java.source=21

# --- Coverage + test reports -------------------------------------------
# Generated by the `coverage` Maven profile (see pom.xml). The JaCoCo
# prepare-agent binds to the `test` phase and the report goal binds to
# `verify`, so target/site/jacoco/jacoco.xml exists by the time the
# scanner runs.
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=target/surefire-reports

# --- Exclusions ---------------------------------------------------------
# The Spring Boot main class is a generated entry point with no logic
# worth analysing. Adding it would inflate LoC and produce zero signal.
sonar.exclusions=**/VulnerableSpringAppApplication.java
